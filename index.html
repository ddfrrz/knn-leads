<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#070421" />
  <title>KNN Idiomas América — The world is here.</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-gradient" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="page">

    <!-- LOGO -->
    <header class="header">
      <img src="logo.png" alt="KNN Idiomas Joinville América" class="logo-img" />
      <p class="tagline">The world is here.</p>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h1 class="hero-title">
        Fale o mundo.<br/>
        <span class="hero-gradient-text">Comece hoje.</span>
      </h1>

      <p class="hero-body">
        Deixe seu contato e plante a primeira semente de liberdade.
      </p>

      <!-- FLAGS via twemoji CDN -->
      <div class="flags" aria-label="Idiomas disponíveis">
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f1fa-1f1f8.png" alt="Inglês" title="Inglês" />
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f1ea-1f1f8.png" alt="Espanhol" title="Espanhol" />
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f1e9-1f1ea.png" alt="Alemão" title="Alemão" />
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f1eb-1f1f7.png" alt="Francês" title="Francês" />
        <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f1ee-1f1f9.png" alt="Italiano" title="Italiano" />
      </div>
    </section>

    <!-- FORM CARD -->
    <main class="card" id="form-section">

      <div id="form-view">
        <p class="card-label">Seus dados</p>

        <form id="lead-form" novalidate>

          <div class="field-group">
            <label for="nome">Nome completo <span class="req">*</span></label>
            <input
              type="text" id="nome" name="nome"
              placeholder="Como você se chama?"
              autocomplete="name" inputmode="text" required
            />
            <span class="field-error" id="erro-nome"></span>
          </div>

          <div class="field-group">
            <label for="whatsapp">WhatsApp <span class="req">*</span></label>
            <input
              type="tel" id="whatsapp" name="whatsapp"
              placeholder="(47) 9 9999-9999"
              autocomplete="tel" inputmode="numeric" maxlength="16" required
            />
            <span class="field-error" id="erro-whatsapp"></span>
          </div>

          <div class="field-group">
            <label for="email">E-mail <span class="opt">(opcional)</span></label>
            <input
              type="email" id="email" name="email"
              placeholder="seu@email.com"
              autocomplete="email" inputmode="email"
            />
            <span class="field-error" id="erro-email"></span>
          </div>

          <div id="submit-error" class="submit-error" aria-live="polite"></div>

          <button type="submit" id="btn-submit" class="btn-primary">
            <span class="btn-text">Quero ser contactado</span>
            <span class="btn-loader" hidden>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
            </span>
          </button>

        </form>
      </div>

      <!-- SUCCESS -->
      <div id="success-view" hidden>
        <div class="success-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h2 class="success-title">Recebemos!</h2>
        <p class="success-body">Em breve nossa equipe fala com você pelo WhatsApp com uma proposta exclusiva. 🎉</p>
      </div>

    </main>

    <footer class="footer">
      KNN Idiomas América · Joinville, SC
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
